<svg xmlns="http://www.w3.org/2000/svg" width="800" height="240" viewBox="0 0 800 240" role="img" aria-label="Project timeline">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0618"/>
      <stop offset="100%" stop-color="#151028"/>
    </linearGradient>
    <linearGradient id="towerA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ad5afc"/>
      <stop offset="100%" stop-color="#6025a5"/>
    </linearGradient>
    <linearGradient id="towerB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="towerC" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>

  <rect width="800" height="240" fill="url(#bg)" rx="12"/>

  <text x="400" y="28" text-anchor="middle" fill="#c4b5fd" font-family="ui-monospace, Menlo, monospace" font-size="13" letter-spacing="0.1em">PROJECT TIMELINE</text>

  <!-- timeline rail -->
  <line x1="70" y1="198" x2="730" y2="198" stroke="#4c1d95" stroke-width="2"/>
  <circle cx="150" cy="198" r="5" fill="#a855f7"/>
  <circle cx="400" cy="198" r="5" fill="#a855f7"/>
  <circle cx="650" cy="198" r="5" fill="#a855f7"/>

  <text x="150" y="218" text-anchor="middle" fill="#9898a6" font-family="ui-monospace, Menlo, monospace" font-size="10">2021</text>
  <text x="400" y="218" text-anchor="middle" fill="#9898a6" font-family="ui-monospace, Menlo, monospace" font-size="10">2023</text>
  <text x="650" y="218" text-anchor="middle" fill="#9898a6" font-family="ui-monospace, Menlo, monospace" font-size="10">2025</text>

  <!-- B.well tower (tallest — 65M users) -->
  <rect x="110" y="58" width="80" height="140" rx="4" fill="url(#towerA)" opacity="0.95"/>
  <rect x="118" y="66" width="64" height="18" rx="2" fill="#0d0820" opacity="0.55"/>
  <text x="150" y="79" text-anchor="middle" fill="#f3e8ff" font-family="ui-monospace, Menlo, monospace" font-size="8" font-weight="bold">B.well</text>
  <text x="150" y="100" text-anchor="middle" fill="#faf5ff" font-family="ui-monospace, Menlo, monospace" font-size="11" font-weight="bold">65M+</text>
  <text x="150" y="114" text-anchor="middle" fill="#e9d5ff" font-family="ui-monospace, Menlo, monospace" font-size="8">users</text>
  <text x="150" y="136" text-anchor="middle" fill="#ddd6fe" font-family="ui-monospace, Menlo, monospace" font-size="7">75% faster</text>
  <text x="150" y="148" text-anchor="middle" fill="#ddd6fe" font-family="ui-monospace, Menlo, monospace" font-size="7">delivery</text>
  <text x="150" y="168" text-anchor="middle" fill="#c4b5fd" font-family="ui-monospace, Menlo, monospace" font-size="7">2021 – 2025</text>

  <!-- Contract portal building -->
  <rect x="350" y="118" width="70" height="80" rx="4" fill="url(#towerC)" opacity="0.95"/>
  <rect x="358" y="126" width="54" height="16" rx="2" fill="#0d0820" opacity="0.55"/>
  <text x="385" y="138" text-anchor="middle" fill="#ecfdf5" font-family="ui-monospace, Menlo, monospace" font-size="7" font-weight="bold">Biz Portal</text>
  <text x="385" y="158" text-anchor="middle" fill="#d1fae5" font-family="ui-monospace, Menlo, monospace" font-size="7">Invoices</text>
  <text x="385" y="170" text-anchor="middle" fill="#d1fae5" font-family="ui-monospace, Menlo, monospace" font-size="7">Field ops</text>
  <text x="385" y="186" text-anchor="middle" fill="#a7f3d0" font-family="ui-monospace, Menlo, monospace" font-size="7">Contract</text>

  <!-- Kronos tower -->
  <rect x="610" y="88" width="80" height="110" rx="4" fill="url(#towerB)" opacity="0.95"/>
  <rect x="618" y="96" width="64" height="18" rx="2" fill="#0d0820" opacity="0.55"/>
  <text x="650" y="109" text-anchor="middle" fill="#eff6ff" font-family="ui-monospace, Menlo, monospace" font-size="8" font-weight="bold">Kronos</text>
  <text x="650" y="132" text-anchor="middle" fill="#dbeafe" font-family="ui-monospace, Menlo, monospace" font-size="10" font-weight="bold">85%</text>
  <text x="650" y="146" text-anchor="middle" fill="#bfdbfe" font-family="ui-monospace, Menlo, monospace" font-size="7">fewer errors</text>
  <text x="650" y="164" text-anchor="middle" fill="#93c5fd" font-family="ui-monospace, Menlo, monospace" font-size="7">0 downtime</text>
  <text x="650" y="182" text-anchor="middle" fill="#93c5fd" font-family="ui-monospace, Menlo, monospace" font-size="7">2025 – now</text>

  <!-- connection arcs -->
  <path d="M 190 130 Q 290 90 350 140" fill="none" stroke="#7c3aed" stroke-width="1" opacity="0.35" stroke-dasharray="4 3"/>
  <path d="M 420 150 Q 510 110 610 130" fill="none" stroke="#7c3aed" stroke-width="1" opacity="0.35" stroke-dasharray="4 3"/>
</svg>
