<svg xmlns="http://www.w3.org/2000/svg" width="680" height="96" viewBox="0 0 680 96" role="img" aria-label="Han Paterka, Senior Software Engineer">
  <defs>
    <linearGradient id="name-shine" x1="0" y1="0" x2="680" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="40%" stop-color="#111827"/>
      <stop offset="50%" stop-color="#7c3aed"/>
      <stop offset="60%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#111827"/>
      <animate attributeName="x1" values="-300;680" dur="4.5s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="380;1360" dur="4.5s" repeatCount="indefinite"/>
    </linearGradient>
  </defs>

  <rect width="680" height="96" fill="#ffffff"/>

  <text x="340" y="44" text-anchor="middle" fill="url(#name-shine)"
    font-family="ui-monospace, Menlo, monospace" font-size="28" font-weight="700" letter-spacing="0.04em">
    Han Paterka
  </text>
  <text x="340" y="68" text-anchor="middle" fill="#7c3aed"
    font-family="ui-monospace, Menlo, monospace" font-size="13" font-weight="600" letter-spacing="0.12em">
    SENIOR SOFTWARE ENGINEER
    <animate attributeName="opacity" values="0.82;1;0.82" dur="3s" repeatCount="indefinite"/>
  </text>
</svg>
